name: Release (Windows)

# Build the Windows installer and publish it to a GitHub Release.
# Triggers on a version tag push (e.g. `git tag v0.1.0 && git push --tags`)
# or manually via the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Rust sidecar (release)
        working-directory: ${{ github.workspace }}
        run: cargo build --release -p runtime-host

      - name: Stage sidecar binary for packaging
        run: |
          New-Item -ItemType Directory -Force -Path resources | Out-Null
          Copy-Item "$env:GITHUB_WORKSPACE\target\release\runtime-host.exe" "resources\runtime-host.exe"

      - name: Install JS dependencies
        run: npm ci

      - name: Build main / preload / renderer
        run: npm run build

      - name: Package and publish Windows installer
        run: npx --no-install electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
